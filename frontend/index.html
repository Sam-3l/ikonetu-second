<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IkonetU — African Founder Scoring Platform</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="description" content="The FICO score for African founders. Verify, score, and connect." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230A0A0A'/><text y='.9em' font-size='70' x='15' fill='%23F5C842'>I</text></svg>" />
  <!-- Light mode only — no prefers-color-scheme dark media query anywhere in this app -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #F8F7F4;
      color: #0A0A0A;
      /* Light mode is permanent — no CSS variable toggling */
      color-scheme: light;
    }
    #root { min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered', reg.scope))
          .catch(err => console.warn('[SW] Registration failed', err));
      });
    }
  </script>
</body>
</html>
