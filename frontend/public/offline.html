<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IkonetU — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8F7F4; color: #0A0A0A;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; color-scheme: light;
    }
    .card {
      background: #fff; border: 1px solid #E0DED8;
      border-radius: 16px; padding: 48px 40px;
      text-align: center; max-width: 420px; width: 100%;
    }
    .logo { background: #0A0A0A; display: inline-block; border-radius: 10px; padding: 10px 20px; margin-bottom: 28px; }
    .logo span { color: #F5C842; font-size: 22px; font-weight: 700; letter-spacing: .04em; }
    .icon { font-size: 48px; margin-bottom: 20px; display: block; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: #888; line-height: 1.7; margin-bottom: 28px; }
    button {
      background: #0A0A0A; color: #fff; border: none;
      border-radius: 10px; padding: 12px 28px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    button:hover { opacity: .85; }
    .sub { font-size: 12px; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>IkonetU</span></div>
    <span class="icon">📡</span>
    <h1>You're offline</h1>
    <p>
      IkonetU needs an internet connection to load your score data and verify documents.
      Check your connection and try again.
    </p>
    <button onclick="window.location.reload()">Try again</button>
    <p class="sub">customer.service@ikonetu.com</p>
  </div>
</body>
</html>
