version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ikonetu
      POSTGRES_USER: ikonetu_app
      POSTGRES_PASSWORD: dev_password_change_in_prod
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ikonetu_app -d ikonetu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  auth-service:
    build: {context: ., args: {SERVICE_NAME: auth-service}}
    env_file: .env
    environment: {PORT: "3001", DB_HOST: postgres, REDIS_URL: "redis://redis:6379"}
    ports: ["3001:3001"]
    depends_on: {postgres: {condition: service_healthy}, redis: {condition: service_healthy}}
    restart: unless-stopped

  user-service:
    build: {context: ., args: {SERVICE_NAME: user-service}}
    env_file: .env
    environment: {PORT: "3001", DB_HOST: postgres, REDIS_URL: "redis://redis:6379"}
